{% extends "admin/change_form.html" %}
{% load core_tags %}

{% block extrastyle %}
{{ block.super }}
<style>
  .archivebox-rss-object-tool a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .archivebox-rss-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 7px;
    border-radius: 4px;
    background: #fff3e0;
    border: 1px solid #f59e0b;
    color: #7c2d12;
    font-weight: 700;
    font-size: 12px;
    line-height: 1.2;
  }
  .archivebox-rss-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #f97316;
    box-shadow: 0 0 0 3px rgba(249, 115, 22, .18);
  }
</style>
{% endblock %}

{% block object-tools-items %}
{% if original %}
  {% api_token as api_token %}
  <li class="archivebox-rss-object-tool">
    <a href="/api/v1/core/snapshots.rss?created_by={{ original.username|urlencode }}&amp;limit=50{% if api_token %}&amp;api_key={{ api_token|urlencode }}{% endif %}" title="Snapshot RSS feed for {{ original.username }}">
      <span class="archivebox-rss-badge"><span class="archivebox-rss-dot" aria-hidden="true"></span>RSS</span>
      Snapshot Feed
    </a>
  </li>
{% endif %}
{{ block.super }}
{% endblock %}
